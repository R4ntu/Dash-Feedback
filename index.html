<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard de Feedbacks · Shopee</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--s:#EE4D2D;--sl:#FFF0ED;--sp:#FEF6F4}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:.75rem;background:#f0f0f0;min-height:100vh}
.app{max-width:1100px;margin:0 auto;background:#fff;border-radius:12px;padding:1rem;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.hdr{background:var(--s);border-radius:10px;padding:13px 18px;display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.logo{display:flex;align-items:center;gap:8px}
.logo-t{color:#fff;font-size:17px;font-weight:600}
.logo-s{color:rgba(255,255,255,.75);font-size:11px;margin-left:auto;text-align:right;line-height:1.4}
.reload-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;margin-left:8px}
.reload-btn:hover{background:rgba(255,255,255,.3)}
.status{font-size:12px;padding:10px 14px;border-radius:7px;display:none;line-height:1.8;margin-bottom:1rem}
.status.err{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;display:block}
.status.ok{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;display:block}
.status.loading{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE;display:block}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1rem}
.metric{background:#fff;border:0.5px solid #e0e0e0;border-radius:8px;padding:10px 13px;border-left:3px solid var(--s)}
.metric label{font-size:10px;color:#666;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.metric span{font-size:20px;font-weight:500;color:var(--s)}.metric span.v3{color:#3B6D11}.metric span.v4{color:#185FA5}
.charts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem}
@media(max-width:680px){.charts{grid-template-columns:1fr}}
.ccard{background:#fff;border:0.5px solid #e0e0e0;border-radius:10px;padding:11px}
.ctitle{font-size:10px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:9px}
.bar-chart{display:flex;flex-direction:column;gap:5px}
.br{display:flex;align-items:center;gap:5px;font-size:11px}
.bl{width:72px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bt{flex:1;background:#f0f0f0;border-radius:3px;height:11px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .4s}.bv{width:20px;text-align:right;color:#1a1a1a;font-weight:500;flex-shrink:0}
.donut-w{display:flex;flex-direction:column;align-items:center;gap:7px}
.dleg{display:flex;flex-direction:column;gap:3px;width:100%}
.legr{display:flex;align-items:center;gap:4px;font-size:10px;color:#666}
.legd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.filt{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:7px;margin-bottom:7px}
.filt select{width:100%;font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid #ddd;background:#fff}
.row2{display:flex;gap:7px;align-items:center;margin-bottom:.9rem;flex-wrap:wrap}
.row2 input{flex:1;min-width:160px;font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #ddd}
.btn-r{font-size:12px;padding:5px 11px;border-radius:6px;border:1px solid var(--s);background:transparent;color:var(--s);cursor:pointer;font-weight:500}
.btn-r:hover{background:var(--sl)}.cnt{font-size:11px;color:#666;margin-left:auto;white-space:nowrap}
.tw{border:0.5px solid #e0e0e0;border-radius:10px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;min-width:580px}
th{background:var(--sp);color:var(--s);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.04em;padding:9px;text-align:left;border-bottom:1px solid #FCCABC;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
th:hover{background:#FDDDD5}
td{padding:8px 9px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--sp)}
.badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:999px;font-weight:500;white-space:nowrap}
.t-pne{background:#FFF0D4;color:#8B5E00}.t-pe{background:#FFE8E4;color:#BF2D0F}
.t-qp{background:#E0F0FF;color:#0050A0}.t-sobra{background:#E6F5E0;color:#2E6B18}
.t-falta{background:#F5E8F8;color:#6B2080}.t-out{background:#F1EFE8;color:#5F5E5A}
.cad-badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;background:#EEEDFE;color:#3C3489}
.nb{display:flex;align-items:center;gap:4px}
.nf{flex:1;height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.nfil{height:100%;background:var(--s);border-radius:3px}.nn{font-size:11px;font-weight:500;color:var(--s)}
.asb{color:var(--s);font-size:11px;display:inline-flex;align-items:center;gap:2px;border:1px solid #FCCABC;border-radius:6px;padding:3px 7px;cursor:pointer;background:transparent;font-weight:500}
.asb:hover{background:var(--sl)}.empty{text-align:center;padding:3rem;color:#999;font-size:13px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:1rem}
.modal-box{background:#fff;border-radius:12px;padding:1.25rem;width:440px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.footer{margin-top:1rem;font-size:10px;color:#ccc;text-align:center}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 100 100"><rect width="100" height="100" rx="18" fill="white"/><text x="50" y="68" text-anchor="middle" font-size="58" font-weight="bold" fill="#EE4D2D" font-family="Arial,sans-serif">S</text></svg>
      <span class="logo-t">Shopee</span>
    </div>
    <div class="logo-s" id="hdrSub">Controle de Feedbacks<br>CADPE</div>
    <button class="reload-btn" onclick="loadData()">🔄 Atualizar</button>
  </div>

  <div class="status" id="statusBar"></div>

  <div id="dash" style="display:none">
    <div class="metrics" id="metrics"></div>
    <div class="charts">
      <div class="ccard"><div class="ctitle">Feedbacks por Gestor</div><div class="bar-chart" id="cg"></div></div>
      <div class="ccard"><div class="ctitle">Tipos de Feedback</div><div class="donut-w"><canvas id="dc" width="110" height="110"></canvas><div class="dleg" id="dl"></div></div></div>
      <div class="ccard"><div class="ctitle">Nota Média por Gestor</div><div class="bar-chart" id="cn"></div></div>
    </div>
    <div class="filt" id="fa"></div>
    <div class="row2">
      <input type="text" id="busca" placeholder="Buscar colaborador, gestor, tipo, mensagem..." oninput="render()"/>
      <button class="btn-r" onclick="limpar()">Limpar filtros</button>
      <span class="cnt" id="cnt"></span>
    </div>
    <div class="tw">
      <table>
        <thead><tr>
          <th style="width:84px"  onclick="sortBy('data')">Data ↕</th>
          <th style="width:70px"  onclick="sortBy('cad')">CAD ↕</th>
          <th style="width:100px" onclick="sortBy('gestor')">Gestor ↕</th>
          <th                     onclick="sortBy('colaborador')">Colaborador ↕</th>
          <th style="width:108px" onclick="sortBy('tipo')">Tipo ↕</th>
          <th style="width:62px"  onclick="sortBy('nota')">Nota ↕</th>
          <th style="width:72px">Status</th>
          <th style="width:84px">Assinatura</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="footer">Dashboard de Feedbacks · Shopee CADPE · via Google Apps Script</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  COLE A URL DO SEU APPS SCRIPT AQUI ↓                   ║
// ╚══════════════════════════════════════════════════════════╝
const SCRIPT_URL = 'https://script.google.com/macros/library/d/1dSswuYxfMhNboL-Z91Fe6HxyvxVB0WVQTkRpgCunI5plHX34NKuLpMEN/5';
// Exemplo:
// const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx.../exec';

// ═══════════════════════════════════════════════════════════
const COLORS = ['#EE4D2D','#F5810A','#FFBA49','#3B6D11','#185FA5','#854F0B','#993356'];
let USUARIO_MAP = {}, RAW = [], sortCol = 'data', sortAsc = true, donutChart = null;

window.addEventListener('DOMContentLoaded', loadData);

// ── Carregar dados ─────────────────────────────────────────
async function loadData() {
  if (!SCRIPT_URL || SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbxVzQll2lc5k42v3m7SFFwN1Z-F0yfHjQGgDccyzBIXxr2H8e_AUwVCXvI2F411Zrgs/exec') {
    setStatus('⚠️ Edite o arquivo <strong>index.html</strong> e cole a URL do Apps Script na variável <code>SCRIPT_URL</code>.', 'err');
    return;
  }
  setStatus('⏳ Carregando dados...', 'loading');
  try {
    const resp = await fetch(SCRIPT_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();          // pega como texto primeiro
    const json = JSON.parse(text);           // parseia manualmente (evita corrupção)
    if (json.status === 'error') throw new Error(json.message);
    if (!json.rows || !json.rows.length) throw new Error('Planilha sem dados.');
    processData(json.rows);
  } catch(e) {
    const isFetch = e.message.includes('Failed to fetch') || e.message.includes('NetworkError');
    setStatus(isFetch
      ? '❌ Não foi possível conectar. Verifique se o script foi publicado como <strong>"Qualquer pessoa"</strong>.'
      : '❌ ' + e.message, 'err');
  }
}

// ── Processar dados ────────────────────────────────────────
function processData(rows) {
  USUARIO_MAP = {};
  const keys = Object.keys(rows[0]);
  // Normaliza string para comparação (sem acento, minúsculo)
  const n = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const find = al => keys.find(k => al.some(a => n(k).includes(n(a)))) || '';

  const K = {
    data:        find(['data/hora','data','date']),
    cad:         find(['cad']),
    usuario:     find(['usuario','user','email']),
    gestor:      find(['gestor','manager']),
    colaborador: find(['colaborador','funcionario']),
    tipo:        find(['tipo de feedback','tipo']),
    status:      find(['endereco tratado','status','situacao']),
    nota:        find(['nota','grade']),
    mensagem:    find(['mensagem','observacao','descricao']),
    assinatura:  find(['assinatura (texto)','assinatura(texto)','assinatura texto','assinatura']),
  };

  console.log('🔍 Colunas detectadas:', K);
  console.log('📋 Colunas da planilha:', keys);

  RAW = rows.map(r => {
    const usuario = (r[K.usuario] || '').trim();
    const gestor  = (r[K.gestor]  || '').trim();
    const key     = usuario || gestor;

    // Monta mapa email → nome canônico (mais curto)
    if (key && (!USUARIO_MAP[key] || gestor.length < (USUARIO_MAP[key]||'').length))
      USUARIO_MAP[key] = gestor;

    // Assinatura: limpa e garante prefixo correto
    let assin = (r[K.assinatura] || '').trim().replace(/[\r\n\t]/g, '');
    if (assin) {
      if (!assin.startsWith('data:')) {
        // Já é base64 puro — adiciona prefixo
        assin = 'data:image/jpeg;base64,' + assin;
      }
      // Se vier com prefixo duplicado (data:image...base64,/9j/...) mantém como está
    }

    return {
      data:        (r[K.data] || '').substring(0, 16),
      cad:         (r[K.cad]  || '').trim(),
      usuario:     key,
      colaborador: (r[K.colaborador] || '').trim(),
      tipo:        (r[K.tipo]        || '').trim(),
      status:      (r[K.status]      || '').trim(),
      nota:        parseInt(r[K.nota]) || 0,
      mensagem:    (r[K.mensagem]    || '').trim(),
      assinatura:  assin,
    };
  }).filter(r => r.colaborador || r.usuario);

  // Normaliza nome do gestor
  RAW.forEach(r => { r.gestor = USUARIO_MAP[r.usuario] || r.usuario; });

  // Debug: mostra quantos têm assinatura
  const comAssin = RAW.filter(r => r.assinatura).length;
  console.log(`✅ ${RAW.length} registros | 🖊️ ${comAssin} com assinatura`);
  if (comAssin > 0) {
    console.log('📸 Amostra assinatura[0]:', RAW.find(r=>r.assinatura)?.assinatura?.substring(0,80));
  }

  buildFilters();
  document.getElementById('dash').style.display = 'block';
  setStatus(`✅ ${RAW.length} feedbacks carregados! (${comAssin} com assinatura)`, 'ok');
  setTimeout(() => setStatus('', ''), 4000);
  render();
}

// ── Filtrar ────────────────────────────────────────────────
function filtered() {
  const g  = document.getElementById('fG')?.value  || '';
  const ca = document.getElementById('fCA')?.value || '';
  const c  = document.getElementById('fC')?.value  || '';
  const t  = document.getElementById('fT')?.value  || '';
  const s  = document.getElementById('fS')?.value  || '';
  const b  = (document.getElementById('busca')?.value || '').toLowerCase();
  let rows = RAW.filter(r => {
    if (g  && r.usuario     !== g)  return false;
    if (ca && r.cad         !== ca) return false;
    if (c  && r.colaborador !== c)  return false;
    if (t  && r.tipo        !== t)  return false;
    if (s  && r.status      !== s)  return false;
    if (b  && ![r.colaborador,r.gestor,r.tipo,r.mensagem,r.cad].join(' ').toLowerCase().includes(b)) return false;
    return true;
  });
  rows.sort((a, b) => {
    const va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'nota') return sortAsc ? va-vb : vb-va;
    return sortAsc ? String(va).localeCompare(String(vb),'pt-BR')
                   : String(vb).localeCompare(String(va),'pt-BR');
  });
  return rows;
}

function renderMetrics(rows) {
  const concl = rows.filter(r => r.status === 'Concluido').length;
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><label>Total</label><span>${rows.length}</span></div>
    <div class="metric"><label>Concluídos</label><span class="v3">${concl}</span></div>
    <div class="metric"><label>Gestores</label><span class="v4">${new Set(rows.map(r=>r.usuario)).size}</span></div>
    <div class="metric"><label>Colaboradores</label><span class="v4">${new Set(rows.map(r=>r.colaborador)).size}</span></div>`;
}

function renderCharts(rows) {
  const gm={};rows.forEach(r=>{gm[r.gestor]=(gm[r.gestor]||0)+1;});
  const gk=Object.keys(gm).sort((a,b)=>gm[b]-gm[a]);
  const gmax=Math.max(...Object.values(gm),1);
  document.getElementById('cg').innerHTML=gk.map((g,i)=>`
    <div class="br"><div class="bl" title="${esc(g)}">${g.split(' ')[0]}</div>
    <div class="bt"><div class="bf" style="width:${Math.round(gm[g]/gmax*100)}%;background:${COLORS[i%COLORS.length]}"></div></div>
    <div class="bv">${gm[g]}</div></div>`).join('');

  const nm={},nc={};rows.forEach(r=>{nm[r.gestor]=(nm[r.gestor]||0)+r.nota;nc[r.gestor]=(nc[r.gestor]||0)+1;});
  const nk=Object.keys(nm).sort((a,b)=>(nm[b]/nc[b])-(nm[a]/nc[a]));
  document.getElementById('cn').innerHTML=nk.map((g,i)=>{
    const avg=(nm[g]/nc[g]).toFixed(1);
    return `<div class="br"><div class="bl" title="${esc(g)}">${g.split(' ')[0]}</div>
    <div class="bt"><div class="bf" style="width:${Math.round(avg/10*100)}%;background:${COLORS[i%COLORS.length]}"></div></div>
    <div class="bv">${avg}</div></div>`;
  }).join('');

  const tm={};rows.forEach(r=>{tm[r.tipo]=(tm[r.tipo]||0)+1;});
  const tk=Object.keys(tm).sort((a,b)=>tm[b]-tm[a]);
  const tco=tk.map((_,i)=>COLORS[i%COLORS.length]);
  if(donutChart){donutChart.destroy();donutChart=null;}
  donutChart=new Chart(document.getElementById('dc').getContext('2d'),{
    type:'doughnut',
    data:{labels:tk,datasets:[{data:tk.map(k=>tm[k]),backgroundColor:tco,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw}`}}},cutout:'58%'}
  });
  document.getElementById('dl').innerHTML=tk.map((k,i)=>
    `<div class="legr"><div class="legd" style="background:${tco[i]}"></div><span>${esc(k)} (${tm[k]})</span></div>`).join('');
}

function renderTable(rows) {
  document.getElementById('cnt').textContent=`${rows.length} de ${RAW.length}`;
  const tb=document.getElementById('tbody');
  if(!rows.length){tb.innerHTML=`<tr><td colspan="8" class="empty">Nenhum feedback encontrado.</td></tr>`;return;}
  tb.innerHTML=rows.map(r=>{
    const idx=RAW.indexOf(r);
    const sc=r.status==='Concluido'?'color:#3B6D11':'color:#854F0B';
    const temAssin = r.assinatura ? '🖊️' : '';
    return `<tr>
      <td title="${esc(r.data)}">${r.data.split(' ')[0]}</td>
      <td>${r.cad?`<span class="cad-badge">${esc(r.cad)}</span>`:''}</td>
      <td title="${esc(r.gestor)}">${r.gestor.split(' ')[0]}</td>
      <td title="${esc(r.colaborador)}">${esc(r.colaborador)}</td>
      <td><span class="badge ${tc(r.tipo)}">${esc(r.tipo)}</span></td>
      <td><div class="nb"><div class="nf"><div class="nfil" style="width:${r.nota*10}%"></div></div><span class="nn">${r.nota}</span></div></td>
      <td><span style="${sc};font-size:11px">${esc(r.status)}</span></td>
      <td><button class="asb" onclick="verAssinatura(${idx})" title="${temAssin ? 'Assinatura disponível' : 'Sem assinatura'}">${temAssin} Ver ↗</button></td>
    </tr>`;
  }).join('');
}

function render(){const rows=filtered();renderMetrics(rows);renderCharts(rows);renderTable(rows);}
function sortBy(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}render();}
function limpar(){['fG','fCA','fC','fT','fS'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});document.getElementById('busca').value='';render();}

function buildFilters() {
  const USUARIOS = [...new Set(RAW.map(r=>r.usuario).filter(Boolean))].sort((a,b)=>(USUARIO_MAP[a]||a).localeCompare(USUARIO_MAP[b]||b,'pt-BR'));
  const COLABS   = [...new Set(RAW.map(r=>r.colaborador).filter(Boolean))].sort();
  const TIPOS    = [...new Set(RAW.map(r=>r.tipo).filter(Boolean))].sort();
  const CADS     = [...new Set(RAW.map(r=>r.cad).filter(Boolean))].sort();
  const STATS    = [...new Set(RAW.map(r=>r.status).filter(Boolean))].sort();
  document.getElementById('fa').innerHTML=`
    <div><select id="fG" onchange="render()"><option value="">Todos os gestores</option>${USUARIOS.map(u=>`<option value="${esc(u)}">${esc(USUARIO_MAP[u]||u)}</option>`).join('')}</select></div>
    <div><select id="fCA" onchange="render()"><option value="">Todos os CADs</option>${CADS.map(c=>`<option>${esc(c)}</option>`).join('')}</select></div>
    <div><select id="fC" onchange="render()"><option value="">Todos os colaboradores</option>${COLABS.map(c=>`<option>${esc(c)}</option>`).join('')}</select></div>
    <div><select id="fT" onchange="render()"><option value="">Todos os tipos</option>${TIPOS.map(t=>`<option>${esc(t)}</option>`).join('')}</select></div>
    <div><select id="fS" onchange="render()"><option value="">Todos os status</option>${STATS.map(s=>`<option>${esc(s)}</option>`).join('')}</select></div>`;
}

// ── Modal assinatura ───────────────────────────────────────
function verAssinatura(idx) {
  const r = RAW[idx];
  const old = document.getElementById('modal'); if(old) old.remove();
  const temAssin = r.assinatura && r.assinatura.length > 100;
  const m = document.createElement('div');
  m.id='modal'; m.className='modal-ov';
  m.innerHTML=`
    <div class="modal-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:7px;height:7px;border-radius:50%;background:#EE4D2D"></div>
          <span style="font-size:14px;font-weight:500">Assinatura do Colaborador</span>
        </div>
        <button onclick="document.getElementById('modal').remove()" style="background:none;border:none;cursor:pointer;font-size:22px;line-height:1;color:#aaa">×</button>
      </div>
      <div style="background:#FFF0ED;border-radius:8px;padding:10px 12px;margin-bottom:12px;border-left:3px solid #EE4D2D">
        <div style="font-size:12px;font-weight:500;color:#EE4D2D">${esc(r.colaborador)}</div>
        <div style="font-size:11px;color:#666;margin-top:3px">Gestor: ${esc(r.gestor)} · ${esc(r.data)}${r.cad ? ` · <span class="cad-badge" style="font-size:10px">${esc(r.cad)}</span>` : ''}</div>
        <div style="display:flex;gap:8px;margin-top:5px;align-items:center;flex-wrap:wrap">
          <span class="badge ${tc(r.tipo)}" style="font-size:10px">${esc(r.tipo)}</span>
          <span style="font-size:11px;color:#185FA5;font-weight:500">Nota: ${r.nota}/10</span>
          <span style="font-size:11px;color:${r.status==='Concluido'?'#3B6D11':'#854F0B'}">${esc(r.status)}</span>
        </div>
      </div>
      <div id="assinContainer" style="border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;margin-bottom:12px;background:#f9f9f9;min-height:80px;display:flex;align-items:center;justify-content:center">
        ${temAssin
          ? `<img id="assinImg" style="max-width:100%;max-height:260px;display:block;object-fit:contain" alt="Assinatura de ${esc(r.colaborador)}"/>`
          : `<p style="padding:1.5rem;font-size:12px;color:#999;text-align:center">✍ Assinatura não disponível neste registro.</p>`}
      </div>
      <div style="font-size:11px;color:#555;border-top:1px solid #eee;padding-top:10px;line-height:1.7;max-height:110px;overflow:auto">
        <strong style="color:#1a1a1a;display:block;margin-bottom:3px">Mensagem:</strong>${esc(r.mensagem)}
      </div>
    </div>`;
  document.body.appendChild(m);
  m.addEventListener('click', e => { if(e.target===m) m.remove(); });

  // Carrega imagem após inserir no DOM (evita problemas com src muito grande)
  if (temAssin) {
    const img = document.getElementById('assinImg');
    img.onload = () => console.log('✅ Assinatura carregada com sucesso');
    img.onerror = () => {
      console.error('❌ Erro ao carregar assinatura. Prefixo:', r.assinatura?.substring(0,50));
      document.getElementById('assinContainer').innerHTML =
        '<p style="padding:1rem;font-size:12px;color:#999;text-align:center">Erro ao carregar imagem.<br>Verifique o console (F12) para detalhes.</p>';
    };
    img.src = r.assinatura;
  }
}

// ── Helpers ────────────────────────────────────────────────
function tc(t){if(!t)return 't-out';if(t.includes('PNE'))return 't-pne';if(t.includes(' - PE'))return 't-pe';if(t.includes('Qualidade'))return 't-qp';if(t==='Sobra')return 't-sobra';if(t==='Falta')return 't-falta';return 't-out';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setStatus(msg,type){const el=document.getElementById('statusBar');el.innerHTML=msg;el.className='status'+(type?' '+type:'');}
</script>
</body>
</html>
