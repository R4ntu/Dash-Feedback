<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Feedbacks</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --s:#EE4D2D;
  --sl:#FFF0ED;
  --sp:#FEF6F4;

  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f5f5;
  --color-border-tertiary:#e5e5e5;
  --color-text-primary:#222;
  --color-text-secondary:#666;

  --border-radius-md:8px;
  --border-radius-lg:12px;

  --font-sans: Arial, Helvetica, sans-serif;
}

body{font-family:var(--font-sans);background:#fafafa}

.app{padding:1rem}
.hdr{background:var(--s);border-radius:var(--border-radius-lg);padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.logo-t{color:#fff;font-size:18px;font-weight:600}
.logo-s{color:#fff;font-size:12px;margin-left:auto}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1rem}
.metric{background:#fff;border:1px solid #eee;border-radius:10px;padding:12px}
.metric label{font-size:11px;color:#666}
.metric span{font-size:22px;font-weight:600;color:var(--s)}

.charts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
.ccard{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px}
.ctitle{font-size:11px;color:#666;margin-bottom:8px}

.bar-chart{display:flex;flex-direction:column;gap:6px}
.br{display:flex;align-items:center;gap:6px}
.bl{width:80px;font-size:12px;color:#666}
.bt{flex:1;background:#eee;height:10px;border-radius:4px}
.bf{height:100%;background:var(--s);border-radius:4px}
.bv{width:30px;text-align:right;font-size:12px}

table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px;border-bottom:1px solid #eee}
th{background:#fafafa;cursor:pointer}

td{white-space:normal;word-break:break-word}

.badge{padding:2px 6px;border-radius:6px;font-size:10px;background:#eee}
</style>
</head>

<body>

<div class="app">

<div class="hdr">
  <span class="logo-t">Shopee</span>
  <span class="logo-s">Dashboard Feedbacks</span>
</div>

<div class="metrics" id="metrics"></div>

<div class="charts">
  <div class="ccard">
    <div class="ctitle">Por Gestor</div>
    <div id="cg"></div>
  </div>

  <div class="ccard">
    <div class="ctitle">Tipos</div>
    <canvas id="dc"></canvas>
  </div>

  <div class="ccard">
    <div class="ctitle">Nota Média</div>
    <div id="cn"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th onclick="sortBy('data')">Data</th>
<th onclick="sortBy('gestor')">Gestor</th>
<th onclick="sortBy('colaborador')">Colaborador</th>
<th onclick="sortBy('tipo')">Tipo</th>
<th onclick="sortBy('nota')">Nota</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const RAW = [
  {data:"18/04/2026 17:34",gestor:"Agnaldo",colaborador:"Leandro",tipo:"Qualidade",nota:5},
  {data:"20/04/2026 12:37",gestor:"Eveanne",colaborador:"Ana",tipo:"Erro",nota:7},
  {data:"21/04/2026 03:39",gestor:"Jeff",colaborador:"Debora",tipo:"Sobra",nota:10}
];

let sortCol='data', sortAsc=true;
let chart=null;

function parseDateBR(d){
  const [date,time]=d.split(' ');
  const [dia,mes,ano]=date.split('/');
  return new Date(`${ano}-${mes}-${dia}T${time}`);
}

function filtered(){
  let rows=[...RAW];

  rows.sort((a,b)=>{
    let va=a[sortCol], vb=b[sortCol];

    if(sortCol==='data'){
      return sortAsc ? parseDateBR(va)-parseDateBR(vb) : parseDateBR(vb)-parseDateBR(va);
    }

    if(sortCol==='nota'){
      return sortAsc ? va-vb : vb-va;
    }

    return sortAsc
      ? String(va).localeCompare(String(vb))
      : String(vb).localeCompare(String(va));
  });

  return rows;
}

function renderMetrics(rows){
  const media = (rows.reduce((s,r)=>s+r.nota,0)/rows.length).toFixed(1);

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><label>Total</label><span>${rows.length}</span></div>
    <div class="metric"><label>Média</label><span>${media}</span></div>
  `;
}

function renderCharts(rows){
  const tipos={};
  rows.forEach(r=>tipos[r.tipo]=(tipos[r.tipo]||0)+1);

  const labels=Object.keys(tipos);
  const data=Object.values(tipos);

  const canvas=document.getElementById('dc');

  if(!canvas || typeof Chart==='undefined') return;

  if(chart) chart.destroy();

  chart=new Chart(canvas,{
    type:'doughnut',
    data:{
      labels:labels,
      datasets:[{data:data}]
    }
  });
}

function renderTable(rows){
  const tb=document.getElementById('tbody');

  tb.innerHTML = rows.map(r=>`
    <tr>
      <td>${r.data}</td>
      <td>${r.gestor}</td>
      <td>${r.colaborador}</td>
      <td><span class="badge">${r.tipo}</span></td>
      <td>${r.nota}</td>
    </tr>
  `).join('');
}

function render(){
  const rows=filtered();
  renderMetrics(rows);
  renderCharts(rows);
  renderTable(rows);
}

function sortBy(col){
  if(sortCol===col) sortAsc=!sortAsc;
  else {sortCol=col; sortAsc=true;}
  render();
}

render();
</script>

</body>
</html>
