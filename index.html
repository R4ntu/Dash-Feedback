<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard de Feedbacks — Shopee WMS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --shopee:      #EE4D2D;
    --shopee-dark: #C03B20;
    --shopee-light:#FFF2EF;
    --bg:          #F5F5F5;
    --surface:     #FFFFFF;
    --surface2:    #FAFAFA;
    --border:      rgba(0,0,0,0.07);
    --text-1:      #212121;
    --text-2:      #757575;
    --text-3:      #BDBDBD;
    --pending:     #F57C00;
    --done:        #2E7D32;
    --radius:      10px;
    --shadow:      0 1px 4px rgba(0,0,0,0.08);
  }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text-1); font-size: 14px; }
  .topnav { background: var(--shopee); height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; box-shadow: 0 2px 8px rgba(238,77,45,.35); position: sticky; top: 0; z-index: 100; }
  .nav-brand { display: flex; align-items: center; gap: 10px; color: #fff; font-weight: 700; font-size: 18px; }
  .nav-badge { background: rgba(255,255,255,.18); color: #fff; font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,.3); }
  .page { max-width: 1280px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }
  .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--shopee-light); border-top-color: var(--shopee); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: #fff3f0; border: 1px solid #ffc4b5; border-radius: var(--radius); padding: 2rem; text-align: center; max-width: 600px; }
  .error-box code { display: block; background: #fafafa; border: 1px solid #ddd; padding: 10px; margin: 12px 0; font-size: 11px; word-break: break-all; color: #c03b20; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .mcard { background: var(--surface); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); border: 1px solid var(--border); border-bottom: 3px solid var(--shopee); }
  .mcard-label { font-size: 11px; color: var(--text-2); text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
  .mcard-value { font-size: 28px; font-weight: 700; color: var(--text-1); }
  .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; border: 1px solid var(--border); height: 100%; }
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .bar-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .bar-label { width: 140px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 18px; background: #eee; border-radius: 4px; display: flex; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
  .bar-seg { display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700; }
  @media(max-width: 768px) { .g2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-brand">Shopee | Dashboard WMS</div>
  <div class="nav-right">
    <span class="nav-badge" id="nav-total">Conectando...</span>
  </div>
</nav>

<div class="page">
  <div id="loading-state" class="state-box">
    <div class="spinner"></div>
    <p style="color: #757575;">Sincronizando dados da planilha...</p>
  </div>

  <div id="error-state" class="state-box" style="display:none">
    <div class="error-box">
      <h3>Erro na Conexão de Dados</h3>
      <p>Verifique se a planilha está publicada como <strong>CSV</strong> e se o link está correto.</p>
      <code id="error-url"></code>
      <button onclick="location.reload()" style="margin-top:10px; padding:8px 16px; cursor:pointer;">Tentar Novamente</button>
    </div>
  </div>

  <div id="dashboard" style="display:none">
    <div class="metrics">
      <div class="mcard"><div class="mcard-label">Total</div><div class="mcard-value" id="m-total">0</div></div>
      <div class="mcard" style="border-color:var(--pending)"><div class="mcard-label">Pendentes</div><div class="mcard-value" style="color:var(--pending)" id="m-pending">0</div></div>
      <div class="mcard" style="border-color:var(--done)"><div class="mcard-label">Concluídos</div><div class="mcard-value" style="color:var(--done)" id="m-done">0</div></div>
      <div class="mcard" style="border-color:#FFC400"><div class="mcard-label">Média Nota</div><div class="mcard-value" id="m-nota">0</div></div>
    </div>

    <div class="g2">
      <div class="card">
        <h4 style="margin-bottom:15px; font-size:12px; color:var(--text-2); text-transform:uppercase;">Volume por Tipo</h4>
        <div style="height:250px;"><canvas id="tipoChart"></canvas></div>
      </div>
      <div class="card">
        <h4 style="margin-bottom:15px; font-size:12px; color:var(--text-2); text-transform:uppercase;">Status por Categoria</h4>
        <div id="status-rows"></div>
      </div>
    </div>

    <div class="card">
      <h4 style="margin-bottom:15px; font-size:12px; color:var(--text-2); text-transform:uppercase;">Ranking por Gestor</h4>
      <div id="gestor-rows"></div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════ CONFIGURAÇÃO ════════════════════════ */

// 1. O SEU LINK DA PLANILHA (Verifique se termina em output=csv)
const SHEETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSADEp_-15N8tI6OgntuNOZFTvUAIv1XvLgZvmqnW0uwHhhq3dLFMPDvEwmrn46zD7BpsVbe0yAYAa8/pub?output=csv';

// 2. NOMES DAS COLUNAS (Exatamente como estão na Linha 1 da planilha)
const COL = {
  dataHora:    'Data/Hora',
  tipo:        'Tipo de Feedback',
  status:      'Endereço Tratado ?',
  nota:        'Nota',
  gestor:      'Gestor'
};

const STATUS_PENDING = 'Pendente';
const STATUS_DONE    = 'Concluído';

/* ════════════════════════ LÓGICA DO SISTEMA ════════════════════════ */

let charts = {};

async function loadData() {
  const loading = document.getElementById('loading-state');
  const errorBox = document.getElementById('error-state');
  const dashboard = document.getElementById('dashboard');

  try {
    // Cache buster para sempre pegar dados novos do Google
    const response = await fetch(SHEETS_CSV_URL + '&t=' + Date.now());
    if (!response.ok) throw new Error('Erro ao acessar CSV');
    
    const csvText = await response.text();
    const rows = parseCSV(csvText);
    
    if (rows.length === 0) throw new Error('Planilha sem dados');

    renderDashboard(rows);
    
    loading.style.display = 'none';
    dashboard.style.display = 'block';
  } catch (e) {
    console.error(e);
    loading.style.display = 'none';
    errorBox.style.display = 'flex';
    document.getElementById('error-url').textContent = SHEETS_CSV_URL;
  }
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];

  // Remove o BOM (caractere invisível que o Google gera às vezes) e aspas
  const headers = lines[0].split(',').map(h => 
    h.replace(/^"|"$/g, '').replace(/^\ufeff/, '').trim()
  );

  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') inQ = !inQ;
      else if (char === ',' && !inQ) {
        vals.push(cur.trim());
        cur = '';
      } else cur += char;
    }
    vals.push(cur.trim());

    const obj = {};
    headers.forEach((h, i) => {
      obj[h] = (vals[i] || '').replace(/^"|"$/g, '').trim();
    });
    return obj;
  }).filter(r => r[COL.tipo] && r[COL.tipo] !== ""); // Ignora linhas vazias
}

function renderDashboard(rows) {
  // Cálculos de Métricas
  const total = rows.length;
  const pending = rows.filter(r => r[COL.status] === STATUS_PENDING).length;
  const done = rows.filter(r => r[COL.status] === STATUS_DONE).length;
  const notas = rows.map(r => parseFloat(r[COL.nota].replace(',', '.'))).filter(n => !isNaN(n));
  const avgNota = notas.length ? (notas.reduce((a,b) => a+b, 0) / notas.length).toFixed(1) : "0.0";

  document.getElementById('nav-total').textContent = total + ' registros';
  document.getElementById('m-total').textContent = total;
  document.getElementById('m-pending').textContent = pending;
  document.getElementById('m-done').textContent = done;
  document.getElementById('m-nota').textContent = avgNota + '★';

  // Gráfico de Pizza (Tipos)
  const tipoCounts = {};
  rows.forEach(r => {
    const t = r[COL.tipo] || 'Não informado';
    tipoCounts[t] = (tipoCounts[t] || 0) + 1;
  });

  const ctxTipo = document.getElementById('tipoChart').getContext('2d');
  if(charts.tipo) charts.tipo.destroy();
  charts.tipo = new Chart(ctxTipo, {
    type: 'doughnut',
    data: {
      labels: Object.keys(tipoCounts),
      datasets: [{
        data: Object.values(tipoCounts),
        backgroundColor: ['#EE4D2D', '#F57C00', '#2E7D32', '#1565C0', '#673AB7', '#FFC107'],
        borderWidth: 2,
        hoverOffset: 10
      }]
    },
    options: { 
      responsive: true, 
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
    }
  });

  // Barras de Status por Tipo
  const statusPorTipo = {};
  rows.forEach(r => {
    const t = r[COL.tipo];
    if(!statusPorTipo[t]) statusPorTipo[t] = { p: 0, d: 0 };
    if(r[COL.status] === STATUS_PENDING) statusPorTipo[t].p++;
    else if(r[COL.status] === STATUS_DONE) statusPorTipo[t].d++;
  });

  const stDiv = document.getElementById('status-rows');
  stDiv.innerHTML = Object.entries(statusPorTipo).sort((a,b) => (b[1].p+b[1].d) - (a[1].p+a[1].d)).map(([tipo, v]) => {
    const totalRow = v.p + v.d;
    const pPct = (v.p / totalRow * 100).toFixed(0);
    const dPct = (v.d / totalRow * 100).toFixed(0);
    return `
      <div class="bar-row">
        <span class="bar-label" title="${tipo}">${tipo}</span>
        <div class="bar-track">
          ${v.p > 0 ? `<div class="bar-seg" style="width:${pPct}%; background:var(--pending);" title="Pendente">${v.p}</div>` : ''}
          ${v.d > 0 ? `<div class="bar-seg" style="width:${dPct}%; background:var(--done);" title="Concluído">${v.d}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  // Lista de Gestores
  const gestorMap = {};
  rows.forEach(r => {
    const g = r[COL.gestor] || 'Sem Gestor';
    if(!gestorMap[g]) gestorMap[g] = { total: 0, notas: [] };
    gestorMap[g].total++;
    const n = parseFloat(r[COL.nota].replace(',', '.'));
    if(!isNaN(n)) gestorMap[g].notas.push(n);
  });

  const gDiv = document.getElementById('gestor-rows');
  gDiv.innerHTML = Object.entries(gestorMap)
    .sort((a, b) => b[1].total - a[1].total)
    .map(([nome, d]) => {
      const media = d.notas.length ? (d.notas.reduce((a,b)=>a+b,0)/d.notas.length).toFixed(1) : '0.0';
      return `
        <div class="bar-row">
          <span class="bar-label" style="width:200px;">${nome}</span>
          <span style="width:80px; font-size:12px; color:var(--text-2);">Vol: <b>${d.total}</b></span>
          <div style="flex:1; display:flex; align-items:center; gap:5px;">
            <div style="height:8px; background:#f0f0f0; flex:1; border-radius:4px; overflow:hidden;">
              <div style="height:100%; background:#EE4D2D; width:${(media*10)}%;"></div>
            </div>
            <span style="font-size:11px; font-weight:700; min-width:30px;">${media}★</span>
          </div>
        </div>
      `;
    }).join('');
}

// Iniciar
window.onload = loadData;
</script>
</body>
</html>
