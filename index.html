
<h2 class="sr-only">Dashboard de feedbacks Shopee</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--s:#EE4D2D;--sl:#FFF0ED;--sp:#FEF6F4}
.app{font-family:var(--font-sans);padding:.75rem 0}
.hdr{background:var(--s);border-radius:var(--border-radius-lg);padding:13px 18px;display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.logo{display:flex;align-items:center;gap:8px}
.logo svg{width:26px;height:26px}
.logo-t{color:#fff;font-size:17px;font-weight:600}
.logo-s{color:rgba(255,255,255,.75);font-size:11px;margin-left:auto;text-align:right;line-height:1.4}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:8px;margin-bottom:1rem}
.metric{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 13px;border-left:3px solid var(--s)}
.metric label{font-size:10px;color:var(--color-text-secondary);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.metric span{font-size:20px;font-weight:500;color:var(--s)}
.metric span.v3{color:#3B6D11}.metric span.v4{color:#185FA5}.metric span.v5{color:#854F0B}
.charts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem}
.ccard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:11px}
.ctitle{font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:9px}
.bar-chart{display:flex;flex-direction:column;gap:5px}
.br{display:flex;align-items:center;gap:5px;font-size:11px}
.bl{width:70px;color:var(--color-text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bt{flex:1;background:var(--color-background-secondary);border-radius:3px;height:11px;overflow:hidden}
.bf{height:100%;border-radius:3px}
.bv{width:20px;text-align:right;color:var(--color-text-primary);font-weight:500;flex-shrink:0}
.donut-w{display:flex;flex-direction:column;align-items:center;gap:7px}
.dleg{display:flex;flex-direction:column;gap:3px;width:100%}
.legr{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--color-text-secondary)}
.legd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.filt{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:7px;margin-bottom:7px}
.filt select{width:100%;font-size:12px}
.row2{display:flex;gap:7px;align-items:center;margin-bottom:.9rem}
.row2 input{flex:1;font-size:12px}
.btn{font-size:12px;padding:5px 11px;border-radius:var(--border-radius-md);border:0.5px solid var(--s);background:transparent;color:var(--s);cursor:pointer;white-space:nowrap;font-weight:500}
.btn:hover{background:var(--sl)}
.cnt{font-size:11px;color:var(--color-text-secondary);margin-left:auto;white-space:nowrap}
.tw{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{background:var(--sp);color:var(--s);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.04em;padding:8px 9px;text-align:left;border-bottom:0.5px solid #FCCABC;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
th:hover{background:#FDDDD5}
td{padding:8px 9px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sp)}
.badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:999px;font-weight:500;white-space:nowrap}
.t-pne{background:#FFF0D4;color:#8B5E00}.t-pe{background:#FFE8E4;color:#BF2D0F}
.t-qp{background:#E0F0FF;color:#0050A0}.t-sobra{background:#E6F5E0;color:#2E6B18}
.t-falta{background:#F5E8F8;color:#6B2080}.t-out{background:#F1EFE8;color:#5F5E5A}
.cad-badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;background:#EEEDFE;color:#3C3489}
.nb{display:flex;align-items:center;gap:4px}
.nf{flex:1;height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
.nfil{height:100%;background:var(--s);border-radius:3px}
.nn{font-size:11px;font-weight:500;color:var(--s)}
.asb{color:var(--s);font-size:11px;display:inline-flex;align-items:center;gap:2px;border:0.5px solid #FCCABC;border-radius:var(--border-radius-md);padding:3px 7px;cursor:pointer;background:transparent;font-weight:500}
.asb:hover{background:var(--sl)}
.empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:13px}
</style>

    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="18" fill="white"/><text x="50" y="68" text-anchor="middle" font-size="58" font-weight="bold" fill="#EE4D2D" font-family="Arial,sans-serif">S</text></svg>

      <th style="width:70px">Status</th>
      <th style="width:85px">Assinatura</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
</div>

de verificar todos os produtos de ambos os lados antes da armazenagem para evitar erros."},{"data":"21/04/2026 10:03","cad":"Full PE","gestor":"Eveanne Amabia","colab_id":"SPXBR31447","colaborador":"FABIELLY ELAYNE DA SILVA","tipo":"OB Verdadeiro - PNE","status":"Concluido","nota":5,"mensagem":"A colaboradora alegou que não se aplica, pois a mesma armazenou os produtos corretamente."},{"data":"21/04/2026 10:09","cad":"Full PE","gestor":"Eveanne Amabia","colab_id":"SPXBR32839","colaborador":"ELLEN RAYANE AMORIM DA SILVA","tipo":"OB Verdadeiro - PNE","status":"Concluido","nota":5,"mensagem":"A colaboradora não concorda, mas se comprometeu em ficar mais atenta."},{"data":"21/04/2026 10:14","cad":"Full PE","gestor":"Eveanne Amabia","colab_id":"SPXBR32838","colaborador":"ANA CARLA MARIA DOS SANTOS","tipo":"OB Verdadeiro - PNE","status":"Concluido","nota":5,"mensagem":"A colaboradora se recusa a aceitar, alegando outro setor, exemplo o Checking que faz a devolução para outro endereço."},{"data":"21/04/2026 10:51","cad":"CADPE","gestor":"Agnaldo Miguel","colab_id":"AC1740125386","colaborador":"LEANDRO FELICIANO DA SILVA","tipo":"OB Verdadeiro - PNE","status":"Concluido","nota":5,"mensagem":"Feedback realizado com o REP, reforçando a necessidade de melhorar a qualidade e reduzir erros de armazenagem."},{"data":"21/04/2026 10:54","cad":"CADPE","gestor":"Agnaldo Miguel","colab_id":"SPXBR33838","colaborador":"DEYVILLA LORRANE CABRAL DA CUNHA","tipo":"OB Verdadeiro - PNE","status":"Concluido","nota":8,"mensagem":"Feedback realizado com o REP, reforçando a necessidade de melhorar a qualidade e reduzir erros de armazenagem, relacionados a OB verdadeiro – PNE."},{"data":"22/04/2026 00:30","cad":"FBS-PE3","gestor":"JERFFREY GONÇALVES","colab_id":"SPXBR42875","colaborador":"VANUSA DO NASCIMENTO COSTA","tipo":"OB Verdadeiro - PNE","status":"Concluido","nota":10,"mensagem":"O feedback foi aplicado para a colaboradora sobre o erro recente. Ela se comprometeu a trabalhar com total trans const ASSINATURAS_REAIS=[];
const GESTORES=[...new Set(RAW.map(r=>r.gestor))].sort();
const COLABS=[...new Set(RAW.map(r=>r.colaborador))].sort();
const TIPOS=[...new Set(RAW.map(r=>r.tipo))].sort();
const CADS=[...new Set(RAW.map(r=>r.cad))].sort();
let sortCol='data',sortAsc=true,donutChart=null;

function tc(t){
  if(t.includes('PNE')) return 't-pne';
  if(t.includes(' - PE')) return 't-pe';
  if(t.includes('Qualidade')) return 't-qp';
  if(t==='Sobra') return 't-sobra';
  if(t==='Falta') return 't-falta';
  return 't-out';
}

function filtered(){
  const g=document.getElementById('fG')?.value||'';
  const ca=document.getElementById('fCA')?.value||'';
  const c=document.getElementById('fC')?.value||'';
  const t=document.getElementById('fT')?.value||'';
  const s=document.getElementById('fS')?.value||'';
  const b=(document.getElementById('busca')?.value||'').toLowerCase();
  let rows=RAW.filter(r=>{
    if(g&&r.gestor!==g) return false;
    if(ca&&r.cad!==ca) return false;
    if(c&&r.colaborador!==c) return false;
    if(t&&r.tipo!==t) return false;
    if(s&&r.status!==s) return false;
    if(b&&![r.colaborador,r.gestor,r.tipo,r.mensagem,r.cad].join(' ').toLowerCase().includes(b)) return false;
    return true;
  });
  rows.sort((a,b)=>{
    const va=a[sortCol],vb=b[sortCol];
    if(sortCol==='nota') return sortAsc?va-vb:vb-va;
    return sortAsc?String(va).localeCompare(String(vb),'pt-BR'):String(vb).localeCompare(String(va),'pt-BR');
  });
  return rows;
}

function renderMetrics(rows){
  const concl=rows.filter(r=>r.status==='Concluido').length;
  const media=rows.length?(rows.reduce((s,r)=>s+r.nota,0)/rows.length).toFixed(1):0;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><label>Total</label><span>${rows.length}</span></div>
    <div class="metric"><label>Concluídos</label><span class="v3">${concl}</span></div>
    <div class="metric"><label>Nota Média</label><span class="v5">${media}</span></div>
    <div class="metric"><label>Gestores</label><span class="v4">${new Set(rows.map(r=>r.gestor)).size}</span></div>
    <div class="metric"><label>Colaboradores</label><span class="v4">${new Set(rows.map(r=>r.colaborador)).size}</span></div>
  `;
}

function renderCharts(rows){
  const gm={};rows.forEach(r=>{gm[r.gestor]=(gm[r.gestor]||0)+1;});
  const gk=Object.keys(gm).sort((a,b)=>gm[b]-gm[a]);
  const gmax=Math.max(...Object.values(gm),1);
  document.getElementById('cg').innerHTML=gk.map((g,i)=>`
    <div class="br"><div class="bl" title="${g}">${g.split(' ')[0]}</div>
    <div class="bt"><div class="bf" style="width:${Math.round(gm[g]/gmax*100)}%;background:${C[i%C.length]}"></div></div>
    <div class="bv">${gm[g]}</div></div>`).join('');
  const nm={};const nc={};
  rows.forEach(r=>{nm[r.gestor]=(nm[r.gestor]||0)+r.nota;nc[r.gestor]=(nc[r.gestor]||0)+1;});
  const nk=Object.keys(nm).sort((a,b)=>(nm[b]/nc[b])-(nm[a]/nc[a]));
  document.getElementById('cn').innerHTML=nk.map((g,i)=>{
    const avg=(nm[g]/nc[g]).toFixed(1);
    return `<div class="br"><div class="bl" title="${g}">${g.split(' ')[0]}</div>
    <div class="bt"><div class="bf" style="width:${Math.round(avg/10*100)}%;background:${C[i%C.length]}"></div></div>
    <div class="bv">${avg}</div></div>`;
  }).join('');
  const tm={};rows.forEach(r=>{tm[r.tipo]=(tm[r.tipo]||0)+1;});
  const tk=Object.keys(tm).sort((a,b)=>tm[b]-tm[a]);
  const tv=tk.map(k=>tm[k]);
  const tco=tk.map((_,i)=>C[i%C.length]);
  if(donutChart){donutChart.destroy();donutChart=null;}
  const ctx=document.getElementById('dc').getContext('2d');
  donutChart=new Chart(ctx,{type:'doughnut',data:{labels:tk,datasets:[{data:tv,backgroundColor:tco,borderWidth:2,borderColor:'#fff'}]},options:{responsive:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw}`}}},cutout:'58%'}});
  document.getElementById('dl').innerHTML=tk.map((k,i)=>`<div class="legr"><div class="legd" style="background:${tco[i]}"></div><span>${k} (${tm[k]})</span></div>`).join('');
}

function renderTable(rows){
  document.getElementById('cnt').textContent=`${rows.length} de ${RAW.length}`;
  const tb=document.getElementById('tbody');
  if(!rows.length){tb.innerHTML=`<tr><td colspan="8" class="empty">Nenhum registro encontrado.</td></tr>`;return;}
  tb.innerHTML=rows.map(r=>{
    const idx=RAW.indexOf(r);
    const nPct=Math.round(r.nota/10*100);
    const sc=r.status==='Concluido'?'color:#3B6D11':'color:#854F0B';
    return `<tr>
      <td title="${r.data}">${r.data.split(' ')[0]}</td>
      <td><span class="cad-badge">${r.cad}</span></td>
      <td title="${r.gestor}">${r.gestor.split(' ')[0]}</td>
      <td title="${r.colab_id} - ${r.colaborador}">${r.colaborador}</td>
      <td><span class="badge ${tc(r.tipo)}">${r.tipo}</span></td>
      <td><div class="nb"><div class="nf"><div class="nfil" style="width:${nPct}%"></div></div><span class="nn">${r.nota}</span></div></td>
      <td><span style="${sc};font-size:11px">${r.status}</span></td>
      <td><button class="asb" onclick="verAssinatura(${idx})">Ver ↗</button></td>
    </tr>`;
  }).join('');
}

function render(){
  const rows=filtered();
  renderMetrics(rows);
  renderCharts(rows);
  renderTable(rows);
}

function sortBy(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}render();}
function limpar(){['fG','fCA','fC','fT','fS'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});document.getElementById('busca').value='';render();}

function verAssinatura(idx){
  const r=RAW[idx];
  const old=document.getElementById('modal');if(old)old.remove();
  const assin=ASSINATURAS_REAIS[idx]||'';
  const m=document.createElement('div');
  m.id='modal';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999';
  m.innerHTML=`
    <div style="background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:1.25rem;width:380px;max-width:96%;border:0.5px solid var(--color-border-tertiary);max-height:90vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:7px;height:7px;border-radius:50%;background:var(--s)"></div>
          <span style="font-size:14px;font-weight:500;color:var(--color-text-primary)">Assinatura do Colaborador</span>
        </div>
        <button onclick="document.getElementById('modal').remove()" style="background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:20px;line-height:1">×</button>
      </div>
      <div style="background:var(--sl);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:12px;border-left:3px solid var(--s)">
        <div style="font-size:12px;font-weight:500;color:var(--s)">${r.colab_id} · ${r.colaborador}</div>
        <div style="font-size:11px;color:var(--color-text-secondary);margin-top:3px">
          Gestor: ${r.gestor} · ${r.data} · <span class="cad-badge" style="font-size:10px">${r.cad}</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:5px;align-items:center">
          <span class="badge ${tc(r.tipo)}" style="font-size:10px">${r.tipo}</span>
          <span style="font-size:11px;color:#185FA5;font-weight:500">Nota: ${r.nota}/10</span>
          <span style="font-size:11px;color:${r.status==='Concluido'?'#3B6D11':'#854F0B'}">${r.status}</span>
        </div>
      </div>
      ${assin?
        `<div style="border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;margin-bottom:12px;background:#fff;min-height:80px;display:flex;align-items:center;justify-content:center">
          <img src="${assin}" style="max-width:100%;display:block" alt="Assinatura" onerror="this.parentElement.innerHTML='<div style=\\'padding:1rem;text-align:center;font-size:12px;color:var(--color-text-secondary)\\'>Imagem não disponível</div>'"/>
        </div>`:
        `<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;margin-bottom:12px;text-align:center;font-size:12px;color:var(--color-text-secondary)">
          Torne a planilha pública para exibir a assinatura.<br>
          <a href="https://docs.google.com/spreadsheets/d/1FuJlBrtt6Guyepu1I5QKCLMGt_zTjVT1Ekkoq-QBbxw" target="_blank" style="color:var(--s);font-size:11px;font-weight:500">Abrir planilha ↗</a>
        </div>`
      }
      <div style="font-size:11px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary);padding-top:10px;line-height:1.6;max-height:90px;overflow:auto">
        <strong style="color:var(--color-text-primary);display:block;margin-bottom:3px">Mensagem:</strong>${r.mensagem}
      </div>
    </div>`;
  document.body.appendChild(m);
  m.addEventListener('click',e=>{if(e.target===m)m.remove();});
}

async function carregarAssinaturas(){
  try{
    const resp=await fetch('https://docs.google.com/spreadsheets/d/1FuJlBrtt6Guyepu1I5QKCLMGt_zTjVT1Ekkoq-QBbxw/export?format=csv&gid=0');
    if(!resp.ok) return;
    const text=await resp.text();
    const lines=text.split('\n').filter(l=>l.trim());
    const headers=parseRow(lines[0]);
    const idx=headers.findIndex(h=>h.toLowerCase().includes('texto'));
    if(idx>=0) lines.slice(1).forEach((l,i)=>{
      const row=parseRow(l);
      if(row[idx]&&row[idx].startsWith('data:image')) ASSINATURAS_REAIS[i]=row[idx].trim();
    });
    render();
  }catch(e){}
}
function parseRow(line){
  const r=[];let inQ=false,cur='';
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'&&!inQ)inQ=true;
    else if(c==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}
    else if(c===','&&!inQ){r.push(cur.trim());cur='';}
    else cur+=c;
  }
  r.push(cur.trim());return r;
}

document.getElementById('fa').innerHTML=`
  <div><select id="fG" onchange="render()"><option value="">Todos os gestores</option>${GESTORES.map(g=>`<option>${g}</option>`).join('')}</select></div>
  <div><select id="fCA" onchange="render()"><option value="">Todos os CADs</option>${CADS.map(c=>`<option>${c}</option>`).join('')}</select></div>
  <div><select id="fC" onchange="render()"><option value="">Todos os colaboradores</option>${COLABS.map(c=>`<option>${c}</option>`).join('')}</select></div>
  <div><select id="fT" onchange="render()"><option value="">Todos os tipos</option>${TIPOS.map(t=>`<option>${t}</option>`).join('')}</select></div>
  <div><select id="fS" onchange="render()"><option value="">Todos os status</option><option>Concluido</option><option>NA</option></select></div>`;

render();
carregarAssinaturas();
</script>
